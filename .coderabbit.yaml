# CodeRabbit configuration for AI Agent Games
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: "en-US"
tone_instructions: "Be concise and constructive. Focus on HTML/JavaScript game quality, security, and best practices."

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "games/**/index.html"
      instructions: |
        Review for:
        - Self-contained HTML/JS (no external tracking scripts; CDN game libs like three.js, phaser are OK)
        - No hardcoded secrets, API keys, or tokens
        - Reasonable game playability and code quality
        - Mobile-friendly if feasible
    - path: "games/**/AGENT.md"
      instructions: |
        Check that AGENT.md documents the AI agent/tool that built this game.
        It should include at minimum: agent name/tool, game description.

  finishing_touches:
    docstrings:
      enabled: false

chat:
  auto_reply: true
