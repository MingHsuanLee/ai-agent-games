name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate Game Submission
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed game folders
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}

          # All changed paths
          ALL_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "All changed files:"
          echo "$ALL_CHANGED"

          # Build array of all touched game folders
          mapfile -t ALL_FOLDERS < <(
            echo "$ALL_CHANGED" \
              | grep -E '^games/[^/]+/' \
              | sed 's|^\(games/[^/]*/\).*|\1|' \
              | sort -u \
              | sed 's|/$||'
          )

          # Files that are added/copied/modified/renamed (not deleted)
          NON_DEL_FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD)

          # Keep only folders that have at least one non-deleted file
          VALIDATE_FOLDERS=()
          for folder in "${ALL_FOLDERS[@]}"; do
            [ -z "$folder" ] && continue
            if echo "$NON_DEL_FILES" | grep -qE "^${folder}/"; then
              VALIDATE_FOLDERS+=("$folder")
              echo "Will validate: $folder"
            else
              echo "Skipping deletion-only folder: $folder"
            fi
          done

          echo "Folders to validate: ${VALIDATE_FOLDERS[*]}"

          # Write newline-delimited list to GITHUB_OUTPUT
          {
            echo "game_folders<<EOF"
            for folder in "${VALIDATE_FOLDERS[@]}"; do
              echo "$folder"
            done
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Expose deletion_only flag
          if [ ${#VALIDATE_FOLDERS[@]} -eq 0 ] && [ ${#ALL_FOLDERS[@]} -gt 0 ]; then
            echo "deletion_only=true" >> $GITHUB_OUTPUT
            echo "PR is deletion-only — game validation checks will be skipped."
          else
            echo "deletion_only=false" >> $GITHUB_OUTPUT
          fi

      - name: Check AGENT.md present
        id: check_agent_md
        if: steps.changed.outputs.deletion_only != 'true'
        run: |
          MISSING=()
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            if [ ! -f "$folder/AGENT.md" ]; then
              MISSING+=("$folder/AGENT.md")
            fi
          done <<< "${{ steps.changed.outputs.game_folders }}"

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "FAIL: Missing AGENT.md in: ${MISSING[*]}"
            echo "agent_md_ok=false" >> $GITHUB_OUTPUT
            echo "agent_md_missing=${MISSING[*]}" >> $GITHUB_OUTPUT
          else
            echo "PASS: All game folders have AGENT.md"
            echo "agent_md_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Check self-contained (no disallowed CDN/tracking)
        id: check_self_contained
        if: steps.changed.outputs.deletion_only != 'true'
        run: |
          DISALLOWED_PATTERNS=(
            'google-analytics\.com'
            'googletagmanager\.com'
            'facebook\.com/tr'
            'doubleclick\.net'
            'hotjar\.com'
            'mixpanel\.com'
            'segment\.com'
            'amplitude\.com'
            'clarity\.ms'
          )

          CDN_VIOLATIONS=()
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            for html_file in "$folder"/*.html; do
              [ -f "$html_file" ] || continue
              for pattern in "${DISALLOWED_PATTERNS[@]}"; do
                if grep -qiE "$pattern" "$html_file"; then
                  CDN_VIOLATIONS+=("$html_file: $pattern")
                fi
              done
            done
          done <<< "${{ steps.changed.outputs.game_folders }}"

          if [ ${#CDN_VIOLATIONS[@]} -gt 0 ]; then
            echo "FAIL: Disallowed CDN/tracking found:"
            printf '  %s\n' "${CDN_VIOLATIONS[@]}"
            echo "self_contained_ok=false" >> $GITHUB_OUTPUT
            echo "cdn_violations=${CDN_VIOLATIONS[*]}" >> $GITHUB_OUTPUT
          else
            echo "PASS: No disallowed CDN/tracking scripts found"
            echo "self_contained_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for secrets/tokens
        id: check_secrets
        if: steps.changed.outputs.deletion_only != 'true'
        run: |
          SECRET_PATTERNS=(
            'sk-[a-zA-Z0-9]{20,}'
            'ghp_[a-zA-Z0-9]+'
            'AKIA[A-Z0-9]{16}'
            'AIza[0-9A-Za-z\-_]{35}'
            'Bearer [a-zA-Z0-9\-_]{20,}'
          )

          SECRETS_FOUND=()
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            for html_file in "$folder"/*.html; do
              [ -f "$html_file" ] || continue
              for pattern in "${SECRET_PATTERNS[@]}"; do
                if grep -qE "$pattern" "$html_file"; then
                  SECRETS_FOUND+=("$html_file: possible secret ($pattern)")
                fi
              done
            done
          done <<< "${{ steps.changed.outputs.game_folders }}"

          if [ ${#SECRETS_FOUND[@]} -gt 0 ]; then
            echo "FAIL: Possible secrets/tokens found:"
            printf '  %s\n' "${SECRETS_FOUND[@]}"
            echo "secrets_ok=false" >> $GITHUB_OUTPUT
            echo "secrets_found=${SECRETS_FOUND[*]}" >> $GITHUB_OUTPUT
          else
            echo "PASS: No secrets/tokens detected"
            echo "secrets_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Check index.html present and valid HTML
        id: check_index_html
        if: steps.changed.outputs.deletion_only != 'true'
        run: |
          HTML_ISSUES=()
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            html_file="$folder/index.html"
            if [ ! -f "$html_file" ]; then
              HTML_ISSUES+=("$folder: missing index.html")
              continue
            fi
            if ! grep -qi '<!DOCTYPE' "$html_file"; then
              HTML_ISSUES+=("$html_file: missing <!DOCTYPE>")
            fi
            if ! grep -qi '<html' "$html_file"; then
              HTML_ISSUES+=("$html_file: missing <html> tag")
            fi
            if ! grep -qi '<head' "$html_file"; then
              HTML_ISSUES+=("$html_file: missing <head> tag")
            fi
            if ! grep -qi '<body' "$html_file"; then
              HTML_ISSUES+=("$html_file: missing <body> tag")
            fi
          done <<< "${{ steps.changed.outputs.game_folders }}"

          if [ ${#HTML_ISSUES[@]} -gt 0 ]; then
            echo "FAIL: HTML issues found:"
            printf '  %s\n' "${HTML_ISSUES[@]}"
            echo "index_html_ok=false" >> $GITHUB_OUTPUT
            echo "html_issues=${HTML_ISSUES[*]}" >> $GITHUB_OUTPUT
          else
            echo "PASS: All game folders have valid index.html"
            echo "index_html_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for IP-flagged game names
        id: check_ip_names
        if: steps.changed.outputs.deletion_only != 'true'
        run: |
          FLAGGED_PATTERNS=(
            'tetris'
            'breakout'
            'flappy[[:space:]]*bird'
            'flappy-bird'
            'block-drop'
            'brick-breaker'
            'pixel-flap'
          )

          IP_VIOLATIONS=()
          while IFS= read -r folder; do
            [ -z "$folder" ] && continue
            folder_name=$(basename "$folder")
            for pattern in "${FLAGGED_PATTERNS[@]}"; do
              if echo "$folder_name" | grep -qiE "$pattern"; then
                IP_VIOLATIONS+=("$folder: name matches flagged pattern '$pattern'")
              fi
            done
            if [ -f "$folder/AGENT.md" ]; then
              for pattern in "${FLAGGED_PATTERNS[@]}"; do
                if grep -qiE "$pattern" "$folder/AGENT.md"; then
                  IP_VIOLATIONS+=("$folder/AGENT.md: contains flagged pattern '$pattern'")
                fi
              done
            fi
          done <<< "${{ steps.changed.outputs.game_folders }}"

          if [ ${#IP_VIOLATIONS[@]} -gt 0 ]; then
            echo "FAIL: IP-flagged game names detected:"
            printf '  %s\n' "${IP_VIOLATIONS[@]}"
            echo "ip_names_ok=false" >> $GITHUB_OUTPUT
            echo "ip_violations=${IP_VIOLATIONS[*]}" >> $GITHUB_OUTPUT
          else
            echo "PASS: No IP-flagged game names detected"
            echo "ip_names_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment with results
        if: always() && steps.changed.outputs.deletion_only != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const agentMd   = '${{ steps.check_agent_md.outputs.agent_md_ok }}';
            const indexHtml = '${{ steps.check_index_html.outputs.index_html_ok }}';
            const selfCont  = '${{ steps.check_self_contained.outputs.self_contained_ok }}';
            const secrets   = '${{ steps.check_secrets.outputs.secrets_ok }}';
            const ipNames   = '${{ steps.check_ip_names.outputs.ip_names_ok }}';

            const icon = v => v === 'true' ? '✅' : v === 'false' ? '❌' : '⏭️';
            const allPass = [agentMd, indexHtml, selfCont, secrets, ipNames].every(v => v === 'true');

            const body = [
              `## ${allPass ? '✅ All checks passed!' : '❌ Some checks failed'}`,
              '',
              '| Check | Result |',
              '|---|---|',
              `| AGENT.md present | ${icon(agentMd)} |`,
              `| index.html valid | ${icon(indexHtml)} |`,
              `| No tracking scripts | ${icon(selfCont)} |`,
              `| No secrets/tokens | ${icon(secrets)} |`,
              `| No IP-flagged names | ${icon(ipNames)} |`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job if any check failed
        if: |
          steps.changed.outputs.deletion_only != 'true' && (
            steps.check_agent_md.outputs.agent_md_ok == 'false' ||
            steps.check_index_html.outputs.index_html_ok == 'false' ||
            steps.check_self_contained.outputs.self_contained_ok == 'false' ||
            steps.check_secrets.outputs.secrets_ok == 'false' ||
            steps.check_ip_names.outputs.ip_names_ok == 'false'
          )
        run: |
          echo "One or more validation checks failed. See details above."
          exit 1
