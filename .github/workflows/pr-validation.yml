name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for AGENT.md changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "AGENT.md"; then
            echo "AGENT.md has been modified."
          else
            echo "AGENT.md was not modified. Skipping validation."
            # This is informational. We don't fail the build here.
          fi

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Send Telegram notification on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ PR Validation Failed for ai-agent-games
            Repo: ${{ github.repository }}
            PR: ${{ github.event.pull_request.html_url }}
            Actor: ${{ github.actor }}
            Commit: ${{ github.event.pull_request.head.sha }}
