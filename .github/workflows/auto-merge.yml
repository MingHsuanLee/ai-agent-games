name: Auto-Merge on Passing Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["PR Validation"]
    types: [completed]

jobs:
  auto-merge:
    name: Auto-merge if all checks pass
    runs-on: ubuntu-latest
    # Only run on PRs targeting the default branch
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Find associated PR
        id: find_pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const headSha = '${{ github.event.workflow_run.head_sha }}';
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 20
            });
            const pr = prs.data.find(p => p.head.sha === headSha);
            if (!pr) {
              core.setFailed('No open PR found for this commit');
              return '';
            }
            core.setOutput('pr_number', String(pr.number));
            return String(pr.number);

      - name: Merge PR
        if: steps.find_pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.find_pr.outputs.pr_number }}');
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `Auto-merge PR #${prNumber} (all checks passed)`,
              });
              console.log(`PR #${prNumber} successfully auto-merged.`);
            } catch (err) {
              core.setFailed(`Failed to merge PR #${prNumber}: ${err.message}`);
            }
