<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Brick Breaker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e8e8f0; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 0.75rem; }
  h1 { font-size: 1.4rem; }
  #hud { display: flex; gap: 2rem; font-size: 0.9rem; color: #8888aa; }
  #hud span { color: #6c63ff; font-weight: 700; }
  canvas { border: 2px solid #2a2a3a; border-radius: 4px; cursor: none; touch-action: none; }
  #msg { font-size: 1rem; color: #ff6584; min-height: 1.4rem; }
  button { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1.5rem; cursor: pointer; }
</style>
</head>
<body>
<h1>🧱 Brick Breaker</h1>
<div id="hud">Score: <span id="score">0</span> &nbsp; Lives: <span id="lives">3</span></div>
<canvas id="c" width="480" height="400"></canvas>
<div id="msg">Click or tap to launch ball</div>
<button onclick="init()">New Game</button>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=480,H=400,PW=80,PH=10,BR=8,BCOLS=10,BROWS=5,BW=40,BH=16,BPX=4,BPY=4;
const BCOLORS=['#ff6584','#ff9f43','#ffd32a','#43e97b','#6c63ff'];
let paddle,ball,bricks,score,lives,running,launched,animId;

function init() {
  paddle={x:W/2-PW/2,y:H-30,w:PW,h:PH};
  ball={x:W/2,y:H-50,r:BR,dx:3,dy:-3};
  bricks=[];
  for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++) {
    const x=c*(BW+BPX)+BPX+20, y=r*(BH+BPY)+BPY+40;
    bricks.push({x,y,w:BW,h:BH,alive:true,color:BCOLORS[r]});
  }
  score=0; lives=3; running=true; launched=false;
  document.getElementById('score').textContent=0;
  document.getElementById('lives').textContent=3;
  document.getElementById('msg').textContent='Click or tap to launch';
  cancelAnimationFrame(animId); loop();
}

function movePaddle(cx) {
  paddle.x=Math.max(0,Math.min(W-paddle.w, cx-paddle.w/2));
}

canvas.addEventListener('mousemove', e => { const r=canvas.getBoundingClientRect(); movePaddle(e.clientX-r.left); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r=canvas.getBoundingClientRect(); movePaddle(e.touches[0].clientX-r.left); }, {passive:false});
canvas.addEventListener('click', () => { if(!launched && running) launched=true; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(!launched&&running) launched=true; const r=canvas.getBoundingClientRect(); movePaddle(e.touches[0].clientX-r.left); }, {passive:false});

function loop() {
  if(!running) return;
  update(); draw();
  animId=requestAnimationFrame(loop);
}

function update() {
  if(!launched) { ball.x=paddle.x+paddle.w/2; ball.y=paddle.y-ball.r-1; return; }
  ball.x+=ball.dx; ball.y+=ball.dy;
  // Walls
  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx*=-1;}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx*=-1;}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.dy*=-1;}
  // Paddle
  if(ball.y+ball.r>paddle.y&&ball.y+ball.r<paddle.y+paddle.h+ball.dy&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w) {
    ball.dy=-Math.abs(ball.dy);
    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.dx=hit*4;
  }
  // Bottom
  if(ball.y>H+ball.r) {
    lives--; document.getElementById('lives').textContent=lives;
    if(lives<=0) { running=false; document.getElementById('msg').textContent='💀 Game Over! Click New Game'; return; }
    launched=false; document.getElementById('msg').textContent='Click to launch';
  }
  // Bricks
  bricks.forEach(b => {
    if(!b.alive) return;
    if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y) {
      b.alive=false; score+=10; document.getElementById('score').textContent=score;
      ball.dy*=-1;
    }
  });
  if(bricks.every(b=>!b.alive)) { running=false; document.getElementById('msg').textContent='🎉 You Win! Click New Game'; }
}

function draw() {
  ctx.fillStyle='#0f0f13'; ctx.fillRect(0,0,W,H);
  // Bricks
  bricks.forEach(b => {
    if(!b.alive) return;
    ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(b.x,b.y,b.w,4);
  });
  // Paddle
  ctx.fillStyle='#6c63ff';
  ctx.beginPath(); ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,5); ctx.fill();
  // Ball
  ctx.fillStyle='#ff6584';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
}

init();
</script>
</body>
</html>
