<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💣 Minesweeper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e8e8f0; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 1rem; gap: 0.75rem; }
  h1 { font-size: 1.4rem; margin-top: 0.5rem; }
  #controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; }
  select, button { background: #1a1a24; color: #e8e8f0; border: 1px solid #2a2a3a; border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; }
  button { background: #6c63ff; border-color: #6c63ff; }
  button:hover { background: #5a52e0; }
  #hud { display: flex; gap: 2rem; align-items: center; font-size: 0.9rem; color: #8888aa; }
  #hud span { color: #6c63ff; font-weight: 700; font-size: 1.1rem; }
  #smiley { font-size: 1.4rem; cursor: pointer; }
  #board { display: grid; gap: 2px; touch-action: none; user-select: none; }
  .cell { width: 30px; height: 30px; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: background 0.1s; }
  .cell:hover { background: #252535; }
  .cell.revealed { background: #0f0f13; border-color: #1a1a24; cursor: default; }
  .cell.flagged { background: #2a1a2a; border-color: #ff6584; }
  .cell.mine-hit { background: #3a1a1a; border-color: #ff6584; }
  .n1{color:#6c63ff} .n2{color:#43e97b} .n3{color:#ff6584} .n4{color:#ff9f43} .n5{color:#ffd32a} .n6{color:#00d2d3} .n7{color:#a29bfe} .n8{color:#8888aa}
  #msg { font-size: 0.9rem; color: #ff6584; min-height: 1.2rem; text-align: center; }
</style>
</head>
<body>
<h1>💣 Minesweeper</h1>
<div id="controls">
  <select id="diff" onchange="init()">
    <option value="easy">Easy (9×9, 10 mines)</option>
    <option value="medium" selected>Medium (16×16, 40 mines)</option>
    <option value="hard">Hard (16×30, 99 mines)</option>
  </select>
  <button onclick="init()">New Game</button>
</div>
<div id="hud">💣 <span id="mcount">0</span> &nbsp; <span id="smiley">🙂</span> &nbsp; ⏱ <span id="timer">0</span></div>
<div id="board"></div>
<div id="msg">Left-click reveal · Right-click flag</div>
<script>
const CONFIGS={easy:{r:9,c:9,m:10},medium:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let grid,rows,cols,mines,revealed,flags,gameOver,started,timerInterval,elapsed;

function init() {
  const cfg=CONFIGS[document.getElementById('diff').value];
  rows=cfg.r; cols=cfg.c; mines=cfg.m;
  grid=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flags=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false; started=false; elapsed=0;
  document.getElementById('mcount').textContent=mines;
  document.getElementById('smiley').textContent='🙂';
  document.getElementById('msg').textContent='Left-click reveal · Right-click flag';
  clearInterval(timerInterval);
  document.getElementById('timer').textContent='0';
  renderBoard();
}

function plantMines(sr,sc) {
  let placed=0;
  while(placed<mines) {
    const r=Math.floor(Math.random()*rows), c=Math.floor(Math.random()*cols);
    if(grid[r][c]===-1||(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)) continue;
    grid[r][c]=-1; placed++;
  }
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    if(grid[r][c]===-1) continue;
    let n=0;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]===-1) n++;
    }
    grid[r][c]=n;
  }
}

function reveal(r,c) {
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flags[r][c]) return;
  revealed[r][c]=true;
  if(grid[r][c]===0) for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) reveal(r+dr,c+dc);
}

function handleClick(r,c) {
  if(gameOver||revealed[r][c]||flags[r][c]) return;
  if(!started) {
    started=true; plantMines(r,c);
    timerInterval=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=elapsed;},1000);
  }
  if(grid[r][c]===-1) {
    gameOver=true; clearInterval(timerInterval);
    revealAllMines(r,c);
    document.getElementById('smiley').textContent='😵';
    document.getElementById('msg').textContent='💥 Boom! Click New Game to try again.';
    renderBoard(); return;
  }
  reveal(r,c);
  checkWin();
  renderBoard();
}

function handleRight(e,r,c) {
  e.preventDefault();
  if(gameOver||revealed[r][c]) return;
  flags[r][c]=!flags[r][c];
  const f=flags.flat().filter(Boolean).length;
  document.getElementById('mcount').textContent=mines-f;
  renderBoard();
}

function revealAllMines(hr,hc) {
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    if(grid[r][c]===-1) revealed[r][c]=true;
  }
}

function checkWin() {
  const totalSafe=rows*cols-mines;
  const safeRevealed=revealed.flat().filter(Boolean).length;
  if(safeRevealed===totalSafe) {
    gameOver=true; clearInterval(timerInterval);
    document.getElementById('smiley').textContent='😎';
    document.getElementById('msg').textContent=`🎉 You win! Time: ${elapsed}s`;
  }
}

function renderBoard() {
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},30px)`;
  board.innerHTML='';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const cell=document.createElement('div');
    cell.className='cell';
    if(flags[r][c]&&!revealed[r][c]) { cell.classList.add('flagged'); cell.textContent='🚩'; }
    else if(revealed[r][c]) {
      cell.classList.add('revealed');
      if(grid[r][c]===-1) { cell.classList.add('mine-hit'); cell.textContent='💣'; }
      else if(grid[r][c]>0) { cell.textContent=grid[r][c]; cell.classList.add(`n${grid[r][c]}`); }
    }
    const rr=r,cc=c;
    cell.addEventListener('click',()=>handleClick(rr,cc));
    cell.addEventListener('contextmenu',e=>handleRight(e,rr,cc));
    cell.addEventListener('touchstart',e=>{ e.preventDefault(); let t=setTimeout(()=>handleRight(e,rr,cc),400); cell._t=t; },{passive:false});
    cell.addEventListener('touchend',e=>{ clearTimeout(cell._t); });
    board.appendChild(cell);
  }
}

init();
</script>
</body>
</html>
