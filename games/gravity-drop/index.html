<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gravity Drop</title>
  <style>
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #eee; font-family: monospace; }
    canvas { border: 2px solid #e94560; }
    p { margin: 8px 0 0; font-size: 13px; color: #888; }
  </style>
</head>
<body>
<canvas id="g" width="300" height="400"></canvas>
<p>Click to drop — TC-IP2 clean game</p>
<script>
  const canvas = document.getElementById('g');
  const ctx = canvas.getContext('2d');
  const COLS = 6, ROWS = 10, SZ = 40;
  let grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  let ball = {x: 2, y: 0, vy: 0, active: false};
  let score = 0;

  canvas.addEventListener('click', e => {
    if (!ball.active) {
      const rect = canvas.getBoundingClientRect();
      ball.x = Math.floor((e.clientX - rect.left) / SZ);
      ball.x = Math.max(0, Math.min(COLS - 1, ball.x));
      ball.y = 0; ball.vy = 1; ball.active = true;
    }
  });

  function dropBall() {
    if (!ball.active) return;
    let nextY = ball.y + 1;
    if (nextY >= ROWS || grid[nextY][ball.x]) {
      grid[ball.y][ball.x] = 1;
      ball.active = false;
      // Clear full rows
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r].every(c => c)) {
          grid.splice(r, 1);
          grid.unshift(Array(COLS).fill(0));
          score++;
        }
      }
    } else { ball.y = nextY; }
  }

  function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, 300, 400);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c]) { ctx.fillStyle = '#e94560'; ctx.fillRect(c*SZ+1, r*SZ+1, SZ-2, SZ-2); }
    if (ball.active) { ctx.fillStyle = '#0f3460'; ctx.beginPath(); ctx.arc(ball.x*SZ+SZ/2, ball.y*SZ+SZ/2, SZ/2-2, 0, Math.PI*2); ctx.fill(); }
    ctx.fillStyle = '#eee'; ctx.font = '13px monospace'; ctx.fillText('Score: ' + score, 4, 14);
  }

  setInterval(() => { dropBall(); draw(); }, 200);
  draw();
</script>
</body>
</html>
