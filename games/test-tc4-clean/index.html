<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pong — TC4 Clean Game</title>
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    canvas { border: 2px solid #fff; }
  </style>
</head>
<body>
<canvas id="game" width="600" height="400"></canvas>
<script>
  // Simple self-contained Pong — no external dependencies
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let ball = { x: 300, y: 200, vx: 3, vy: 3, r: 8 };
  let p1 = { y: 160 }, p2 = { y: 160 };
  let score = [0, 0];

  document.addEventListener('keydown', e => {
    if (e.key === 'w') p1.y = Math.max(0, p1.y - 20);
    if (e.key === 's') p1.y = Math.min(320, p1.y + 20);
    if (e.key === 'ArrowUp') p2.y = Math.max(0, p2.y - 20);
    if (e.key === 'ArrowDown') p2.y = Math.min(320, p2.y + 20);
  });

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff';
    // Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    // Paddles
    ctx.fillRect(10, p1.y, 12, 80);
    ctx.fillRect(578, p2.y, 12, 80);
    // Score
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(score[0] + ' : ' + score[1], 300, 30);
  }

  function update() {
    ball.x += ball.vx;
    ball.y += ball.vy;
    if (ball.y - ball.r <= 0 || ball.y + ball.r >= 400) ball.vy *= -1;
    if (ball.x - ball.r <= 22 && ball.y >= p1.y && ball.y <= p1.y + 80) ball.vx *= -1;
    if (ball.x + ball.r >= 578 && ball.y >= p2.y && ball.y <= p2.y + 80) ball.vx *= -1;
    if (ball.x < 0) { score[1]++; ball.x = 300; ball.y = 200; }
    if (ball.x > 600) { score[0]++; ball.x = 300; ball.y = 200; }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }
  loop();
</script>
</body>
</html>
