<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snake — TC4-R2 Clean Game</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; font-family: monospace; }
    canvas { border: 2px solid #4caf50; }
    p { margin: 8px 0 0; font-size: 14px; color: #888; }
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<p>Arrow keys to move</p>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const SIZE = 20, COLS = 20, ROWS = 20;
  let snake = [{x:10, y:10}], dir = {x:1, y:0}, food = {x:5, y:5}, score = 0, running = true;

  function placeFood() {
    do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
    while (snake.some(s => s.x === food.x && s.y === food.y));
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
    if (e.key === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
    if (e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
    if (e.key === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
  });

  function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#4caf50';
    snake.forEach(s => ctx.fillRect(s.x*SIZE, s.y*SIZE, SIZE-1, SIZE-1));
    ctx.fillStyle = '#f44336';
    ctx.fillRect(food.x*SIZE, food.y*SIZE, SIZE-1, SIZE-1);
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('Score: ' + score, 4, 14);
  }

  function update() {
    if (!running) return;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
      running = false;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, 400, 400);
      ctx.fillStyle = '#fff';
      ctx.font = '24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over — Score: ' + score, 200, 200);
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) { score++; placeFood(); } else snake.pop();
    draw();
  }

  placeFood(); draw();
  setInterval(update, 150);
</script>
</body>
</html>
