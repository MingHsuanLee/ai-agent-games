<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐦 Flappy Bird</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 0.5rem; font-family: -apple-system, sans-serif; color: #e8e8f0; }
  h1 { font-size: 1.4rem; }
  canvas { border: 2px solid #2a2a3a; border-radius: 4px; cursor: pointer; touch-action: none; }
  #msg { font-size: 0.9rem; color: #8888aa; min-height: 1.4rem; text-align: center; }
</style>
</head>
<body>
<h1>🐦 Flappy Bird</h1>
<canvas id="c" width="320" height="480"></canvas>
<div id="msg">Tap or press Space to start</div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=320,H=480,GAP=130,PIPE_W=52,PIPE_SPEED=2.5,GRAVITY=0.45,FLAP=-8,BIRD_X=80,BIRD_R=14;
let bird,pipes,score,best=0,state='idle',animId;

function reset() {
  bird={y:H/2,vy:0};
  pipes=[];
  score=0;
  state='playing';
  document.getElementById('msg').textContent='';
}

function flap() {
  if(state==='idle') { reset(); return; }
  if(state==='dead') { reset(); return; }
  bird.vy=FLAP;
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e=>{e.preventDefault();flap();},{passive:false});
document.addEventListener('keydown', e=>{if(e.code==='Space'){e.preventDefault();flap();}});

let frameCount=0;
function loop() {
  frameCount++;
  if(state==='playing') {
    bird.vy+=GRAVITY; bird.y+=bird.vy;
    // Add pipe
    if(frameCount%80===0) {
      const top=60+Math.random()*(H-GAP-100);
      pipes.push({x:W, top, bottom:top+GAP, scored:false});
    }
    pipes.forEach(p=>{
      p.x-=PIPE_SPEED;
      if(!p.scored && p.x+PIPE_W<BIRD_X) { p.scored=true; score++; }
    });
    pipes=pipes.filter(p=>p.x>-PIPE_W);
    // Collision
    const hit = bird.y-BIRD_R<0 || bird.y+BIRD_R>H ||
      pipes.some(p=>BIRD_X+BIRD_R>p.x && BIRD_X-BIRD_R<p.x+PIPE_W && (bird.y-BIRD_R<p.top || bird.y+BIRD_R>p.bottom));
    if(hit) { state='dead'; if(score>best)best=score; document.getElementById('msg').textContent=`💀 Score: ${score} | Best: ${best} — Tap to restart`; }
  }
  draw();
  animId=requestAnimationFrame(loop);
}

function draw() {
  // Sky
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
  // Stars
  if(state==='idle') { ctx.fillStyle='#fff'; [[50,80],[100,40],[200,120],[260,60],[300,200]].forEach(([x,y])=>{ ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }); }
  // Ground
  ctx.fillStyle='#3d5a80'; ctx.fillRect(0,H-40,W,40);
  ctx.fillStyle='#5b8a5a'; ctx.fillRect(0,H-45,W,8);
  // Pipes
  pipes.forEach(p=>{
    ctx.fillStyle='#43e97b';
    ctx.fillRect(p.x,0,PIPE_W,p.top);
    ctx.fillRect(p.x,p.bottom,PIPE_W,H-p.bottom-40);
    // Pipe caps
    ctx.fillStyle='#2ed573';
    ctx.fillRect(p.x-4,p.top-20,PIPE_W+8,20);
    ctx.fillRect(p.x-4,p.bottom,PIPE_W+8,20);
  });
  // Bird
  const angle=Math.max(-0.5,Math.min(1.2,bird.vy*0.08));
  ctx.save();
  ctx.translate(BIRD_X,bird.y);
  ctx.rotate(angle);
  ctx.fillStyle='#ffd32a';
  ctx.beginPath(); ctx.arc(0,0,BIRD_R,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff9f43';
  ctx.beginPath(); ctx.arc(4,-2,BIRD_R*0.55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(6,-5,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0f0f13'; ctx.beginPath(); ctx.arc(8,-5,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff6584'; ctx.fillRect(12,-3,8,4);
  ctx.restore();
  // Score
  ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif'; ctx.textAlign='center';
  ctx.fillText(score,W/2,50);
  // Idle screen
  if(state==='idle') {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,H/2-60,W,120);
    ctx.fillStyle='#ffd32a'; ctx.font='bold 24px sans-serif';
    ctx.fillText('🐦 Flappy Bird',W/2,H/2-20);
    ctx.fillStyle='#e8e8f0'; ctx.font='16px sans-serif';
    ctx.fillText('Tap or Space to start',W/2,H/2+20);
  }
  ctx.textAlign='left';
}

loop();
</script>
</body>
</html>
