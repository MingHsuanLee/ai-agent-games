<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e8e8f0; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; padding: 1rem; }
  h1 { font-size: 1.8rem; font-weight: 800; }
  #hud { display: flex; gap: 1rem; }
  .score-box { background: #1a1a24; border-radius: 8px; padding: 0.5rem 1rem; text-align: center; min-width: 80px; }
  .score-label { font-size: 0.7rem; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; }
  .score-val { font-size: 1.3rem; font-weight: 700; color: #6c63ff; }
  #grid { display: grid; grid-template-columns: repeat(4,80px); gap: 10px; background: #1a1a24; padding: 10px; border-radius: 12px; touch-action: none; }
  .tile { width: 80px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; transition: background 0.1s; }
  .t0{background:#252535;color:transparent}
  .t2{background:#6c63ff;color:#fff}.t4{background:#5a52e0;color:#fff}.t8{background:#ff9f43;color:#fff}
  .t16{background:#ff6584;color:#fff}.t32{background:#ff4757;color:#fff}.t64{background:#fa8231;color:#fff}
  .t128{background:#ffd32a;color:#1a1a24}.t256{background:#43e97b;color:#1a1a24}.t512{background:#00d2d3;color:#1a1a24}
  .t1024{background:#a29bfe;color:#fff}.t2048{background:#ffeaa7;color:#1a1a24;font-size:1.1rem}
  .thigh{background:#dfe6e9;color:#1a1a24;font-size:1rem}
  #msg { font-size: 1rem; color: #ff6584; min-height: 1.4rem; text-align: center; }
  #controls { display: flex; gap: 0.75rem; }
  button { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1.2rem; cursor: pointer; font-size: 0.85rem; }
  .hint { font-size: 0.75rem; color: #555; text-align: center; }
</style>
</head>
<body>
<h1>🔢 2048</h1>
<div id="hud">
  <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
  <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
</div>
<div id="grid"></div>
<div id="msg"></div>
<div id="controls"><button onclick="init()">New Game</button></div>
<div class="hint">Arrow keys or swipe to move tiles</div>
<script>
let board, score, best=parseInt(localStorage.getItem('2048best')||0), won=false, over=false;
document.getElementById('best').textContent=best;

function init() {
  board=Array.from({length:4},()=>Array(4).fill(0));
  score=0; won=false; over=false;
  document.getElementById('score').textContent=0;
  document.getElementById('msg').textContent='';
  addTile(); addTile(); render();
}

function addTile() {
  const empty=[];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.9?2:4;
}

function move(dir) {
  if(over) return;
  const prev=JSON.stringify(board);
  let gained=0;
  const rot=(b,n)=>{let r=b;for(let i=0;i<n;i++)r=r[0].map((_,c)=>r.map(row=>row[c]).reverse());return r;};
  const rots={left:0,down:1,right:2,up:3};
  let b=rot(board,rots[dir]);
  b=b.map(row=>{
    const vals=row.filter(v=>v);
    for(let i=0;i<vals.length-1;i++) if(vals[i]===vals[i+1]){gained+=vals[i]*2;vals[i]*=2;vals.splice(i+1,1);}
    while(vals.length<4)vals.push(0);
    return vals;
  });
  board=rot(b,(4-rots[dir])%4);
  if(JSON.stringify(board)!==prev){score+=gained;document.getElementById('score').textContent=score;if(score>best){best=score;localStorage.setItem('2048best',best);document.getElementById('best').textContent=best;}addTile();}
  checkState(); render();
}

function checkState() {
  if(!won && board.flat().includes(2048)){won=true;document.getElementById('msg').textContent='🎉 You reached 2048! Keep going!';}
  const empty=board.flat().some(v=>!v);
  if(!empty){
    let canMove=false;
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(c<3&&board[r][c]===board[r][c+1])canMove=true;if(r<3&&board[r][c]===board[r+1][c])canMove=true;}
    if(!canMove){over=true;document.getElementById('msg').textContent='😵 No moves left! Click New Game.';}
  }
}

function render() {
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const d=document.createElement('div');
    const v=board[r][c];
    d.className='tile '+(v===0?'t0':v>2048?'thigh':'t'+v);
    d.textContent=v||'';
    grid.appendChild(d);
  }
}

const DIRS={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
document.addEventListener('keydown',e=>{if(DIRS[e.key]){e.preventDefault();move(DIRS[e.key]);}});
let sx,sy;
document.getElementById('grid').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;e.preventDefault();},{passive:false});
document.getElementById('grid').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
  e.preventDefault();
},{passive:false});

init();
</script>
</body>
</html>
